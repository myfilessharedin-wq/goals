<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heart RPG Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4d6d">
  <link rel="stylesheet" href="style.css">

  <script type="module" src="app.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Heart RPG">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">
    <h2 style="text-align:center; color:#444;">My goals ✨</h2>
<div class="add-box">

  <input id="title" placeholder="Goal" />
  <input id="target" type="number" placeholder="Target" />
  <input id="reward" placeholder="Prize" />

  <button id="addBtn">➕ Add goal</button>

</div>
    <div id="goals"></div>
     </div>
<div id="editModal" class="modal hidden">
  <div class="modal-content">
    
    <h3>Edit goal</h3>

    <input id="editTitle" placeholder="Title" />
    <input id="editTarget" type="number" placeholder="Target" />
    <input id="editReward" placeholder="Reward" />

    <div class="modal-actions">
      <button id="saveEdit">Save</button>
      <button id="cancelEdit" class="secondary">Cancel</button>
    </div>

  </div>
</div>
</body>
</html>
